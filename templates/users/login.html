{% extends 'base.html' %}

{% block content %}
<div class="container section-padding">
    <div style="max-width: 450px; margin: 0 auto; background: #fff; padding: 50px; border-radius: 20px; box-shadow: var(--shadow-lg);">
        <div style="text-align: center; margin-bottom: 35px;">
            <h2 style="font-size: 2.25rem; font-weight: 900; margin-bottom: 10px; letter-spacing: -1px;">Welcome Back</h2>
            <p style="color: #718096; font-size: 0.95rem;">Please enter your credentials to continue</p>
        </div>
        
        <form action="{% url 'users:login' %}" method="post">
            {% csrf_token %}
            <div class="form-group" style="margin-bottom: 25px;">
                <label for="id_username" style="display: block; font-size: 0.75rem; color: #718096; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">Username</label>
                <input type="text" name="username" id="id_username" required class="form-control" placeholder="Enter your username" style="padding: 15px; border-radius: 10px; border: 2px solid #f0f0f0;">
            </div>
            <div class="form-group" style="margin-bottom: 30px;">
                <label for="id_password" style="display: block; font-size: 0.75rem; color: #718096; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">Password</label>
                <input type="password" name="password" id="id_password" required class="form-control" placeholder="Enter your password" style="padding: 15px; border-radius: 10px; border: 2px solid #f0f0f0;">
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="padding: 18px; border-radius: 10px; font-weight: 800; font-size: 1rem;">Sign In</button>
        </form>
        
        <p style="text-align: center; margin-top: 30px; color: #718096; font-size: 0.9rem;">
            New to SOLYN? <a href="{% url 'users:registeration' %}" style="color: #000; font-weight: 800;">Create an Account</a>
        </p>
    </div>
</div>
{% endblock %}
