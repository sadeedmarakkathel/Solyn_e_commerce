{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SOLYN</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        :root {
            --sidebar-width: 260px;
        }
        body {
            background-color: #f4f7f6;
            display: flex;
            flex-direction: row;
        }
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: #000;
            color: #fff;
            position: fixed;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .sidebar-link {
            color: #a0aec0;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 40px;
            min-height: 100vh;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0;
        }
        .stat-label {
            font-size: 0.85rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 1.75rem;
            font-weight: 800;
            color: #000;
        }
        .dashboard-card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0;
            margin-bottom: 30px;
        }
        .dashboard-card h3 {
            margin-bottom: 20px;
            font-size: 1.25rem;
            font-weight: 700;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid #f4f7f6;
            color: #718096;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .admin-table td {
            padding: 15px 12px;
            border-bottom: 1px solid #f4f7f6;
            font-size: 0.95rem;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-processing { background: #e2e8f0; color: #4a5568; }
        .status-shipped { background: #edf2f7; color: #2d3748; }
        .status-delivered { background: #000; color: #fff; }
        
        @media (max-width: 992px) {
            .sidebar { width: 80px; padding: 40px 10px; }
            .sidebar-link span { display: none; }
            .sidebar-logo { font-size: 1rem; }
            .main-content { margin-left: 80px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">SOLYN ADMIN</div>
        <a href="{% url 'dashboard:home' %}" class="sidebar-link">🏠 <span>Dashboard</span></a>
        <a href="{% url 'dashboard:orders' %}" class="sidebar-link">📦 <span>Orders</span></a>
        <a href="{% url 'dashboard:products' %}" class="sidebar-link">👟 <span>Products</span></a>
        <a href="{% url 'dashboard:users' %}" class="sidebar-link">👥 <span>Customers</span></a>
        <a href="{% url 'home' %}" class="sidebar-link">🌐 <span>View Site</span></a>
        <div style="margin-top: auto;">
             <a href="{% url 'users:logout' %}" class="sidebar-link">🚪 <span>Logout</span></a>
        </div>
    </div>

    <div class="main-content">
        {% block dashboard_content %}
        {% endblock %}
    </div>
</body>
</html>
